<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam & Reme — 24.07.2027, Orba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2620;
    --paper:#fffdf7;
    --paper-shadow:#eee2c2;
    --sea:#ff8a3d;
    --sea-deep:#e8631f;
    --sea-deeper:#a83e17;
    --clay:#1793a6;
    --olive:#96ab4e;
    --olive-deep:#6f8a3a;
    --gold:#ffc857;
    --line: rgba(255,253,247,0.32);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:'Space Grotesk', sans-serif; margin:0; }
  .mono{ font-family:'Space Mono', monospace; letter-spacing:.08em; }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:6rem 1.5rem 4rem;
    overflow:hidden;
    background:#c47c57;
    color:var(--paper);
  }
  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 20%, rgba(255,255,255,.55), transparent),
      radial-gradient(1.5px 1.5px at 75% 15%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,.35), transparent),
      radial-gradient(1.5px 1.5px at 10% 45%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 40% 12%, rgba(255,255,255,.4), transparent);
    opacity:.4;
    pointer-events:none;
  }
  .ridge{
    position:absolute;
    bottom:0; left:0; width:100%;
    height:34vh;
    z-index:1;
    pointer-events:none;
  }
  .ridge svg{ width:100%; height:100%; display:block; }

  .flying-page{
    position:absolute;
    width:74px; height:74px;
    background:var(--paper);
    border:1px solid rgba(255,253,247,0.55);
    border-radius:5px;
    box-shadow:0 3px 12px rgba(80,40,20,.12);
    overflow:hidden;
    opacity:0;
    pointer-events:none;
    animation: drift 16s linear infinite;
  }
  .flying-page img{ width:100%; height:100%; object-fit:cover; display:block; }
  .flying-page.p1{ left:6%; top:74%; animation-delay:0s; }
  .flying-page.p2{ left:52%; top:66%; animation-delay:1.6s; }
  .flying-page.p3{ left:28%; top:84%; animation-delay:3.2s; }
  .flying-page.p4{ left:78%; top:72%; animation-delay:4.8s; }
  .flying-page.p5{ left:40%; top:62%; animation-delay:6.4s; }
  .flying-page.p6{ left:90%; top:80%; animation-delay:8s; }
  .flying-page.on-light{ border-color:rgba(43,38,32,.2); box-shadow:0 8px 18px rgba(43,38,32,.22); }
  .flying-page.s1{ left:16%; top:68%; animation-delay:9.6s; }
  .flying-page.s2{ left:64%; top:86%; animation-delay:11.2s; }
  .flying-page.s3{ left:36%; top:72%; animation-delay:12.8s; }
  .flying-page.s4{ left:84%; top:64%; animation-delay:14.4s; }
  .flying-page.g1{ left:5%; top:80%; animation-delay:0.8s; }
  .flying-page.g2{ left:24%; top:72%; animation-delay:4.2s; }
  .flying-page.g3{ left:46%; top:85%; animation-delay:7.6s; }
  .flying-page.g4{ left:64%; top:74%; animation-delay:11s; }
  .flying-page.g5{ left:82%; top:82%; animation-delay:14.4s; }
  .flying-page.g6{ left:38%; top:65%; animation-delay:2.5s; }
  @keyframes drift{
    0%{ transform:translate(0,0) rotate(-8deg); opacity:0; }
    10%{ opacity:.6; }
    80%{ opacity:.25; }
    100%{ transform:translate(18px,-62vh) rotate(12deg); opacity:0; }
  }

  .crossed-flags{
    position:relative; z-index:2;
    width:96px; height:78px;
    margin:0 auto 1.2rem;
  }
  .crossed-flags svg{ width:100%; height:100%; display:block; overflow:visible; }
  .flag-caption{
    position:relative; z-index:2;
    font-size:.65rem;
    opacity:.6;
    margin:-0.8rem 0 1.6rem;
    text-transform:uppercase;
  }

  .kid-photos{
    position:relative; z-index:2;
    display:flex; align-items:flex-end; justify-content:center;
    gap:1.2rem;
    margin:1.6rem 0 .4rem;
  }
  .kid-photo{ display:flex; flex-direction:column; align-items:center; gap:.5rem; }
  .kid-photo:first-child .ph-circle{ transform:rotate(-6deg); }
  .kid-photo:last-child .ph-circle{ transform:rotate(6deg); }
  .ph-circle{
    width:112px; height:112px;
    border-radius:50%;
    background:repeating-linear-gradient(135deg, rgba(255,253,247,.22), rgba(255,253,247,.22) 6px, rgba(255,253,247,.1) 6px, rgba(255,253,247,.1) 12px);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(80,40,20,.12);
  }
  .ph-circle svg{ width:28px; height:28px; opacity:.75; }
  .ph-circle img{ width:100%; height:100%; border-radius:50%; object-fit:cover; display:block; }
  .kid-cap{ font-size:.62rem; opacity:.7; text-transform:uppercase; }
  .kid-plus{ font-size:1.1rem; opacity:.6; margin-bottom:1.8rem; }

  .hero h1{
    position:relative; z-index:2;
    font-size:clamp(2.8rem, 8vw, 6rem);
    font-weight:600;
    line-height:1.02;
    font-optical-sizing:auto;
  }
  .hero h1 .amp{
    font-weight:300;
    font-size:0.72em;
    color:var(--paper);
    opacity:.65;
    padding:0 .12em;
    vertical-align:0.03em;
    display:inline-block;
  }
  .hero .subline{
    position:relative; z-index:2;
    margin-top:.9rem;
    font-size:clamp(.95rem, 2vw, 1.15rem);
    opacity:.82;
    font-weight:400;
  }

  /* ---------- FLIP CALENDAR ---------- */
  .calendar-row{
    position:relative; z-index:2;
    display:flex;
    gap:clamp(.6rem, 2vw, 1.4rem);
    margin-top:3rem;
    flex-wrap:wrap;
    justify-content:center;
  }
  .flip-unit{ display:flex; flex-direction:column; align-items:center; gap:.6rem; }
  .flip-card{
    position:relative;
    width:clamp(64px, 15vw, 96px);
    height:clamp(64px, 15vw, 96px);
    perspective:320px;
    filter:drop-shadow(0 3px 8px rgba(90,50,30,.14));
  }
  .ring-pair{ position:absolute; top:-7px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 14%; z-index:5; }
  .ring-pair span{ width:7px; height:7px; border-radius:50%; background:rgba(255,253,247,.5); box-shadow:none; }
  .panel{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper);
    border-radius:9px;
    backface-visibility:hidden;
  }
  .panel .num{
    font-family:'Space Mono', monospace;
    font-weight:600;
    font-size:clamp(1.5rem, 4vw, 2.3rem);
    font-variant-numeric:tabular-nums;
    color:var(--ink);
  }
  .back-panel{ z-index:1; }
  .front-panel{
    z-index:2;
    transform-origin:top center;
    transform:rotateX(0deg);
    transition:transform .6s cubic-bezier(.45,.05,.35,1);
    border-bottom:1px solid var(--paper-shadow);
  }
  .front-panel::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:4px;
    background:rgba(43,38,32,.10);
    border-radius:9px 9px 0 0;
  }
  .front-panel.flipping{ transform:rotateX(-180deg); }
  .front-panel.no-transition{ transition:none; }
  .unit-label{
    font-size:.68rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.7;
  }

  .date-line{
    position:relative; z-index:2;
    margin-top:2.4rem;
    font-size:.85rem;
    opacity:.85;
    display:flex;
    gap:.6rem;
    align-items:center;
  }
  .date-line .dot{ opacity:.5; }

  .scroll-cue{
    position:relative; z-index:2;
    margin-top:3rem;
    font-size:.65rem;
    opacity:.5;
    text-transform:uppercase;
    letter-spacing:.2em;
  }

  /* ---------- STORY SECTION ---------- */
  .story{
    position:relative;
    overflow:hidden;
    background: linear-gradient(180deg, var(--olive-deep), var(--olive));
    color:var(--paper);
    padding:5.5rem 1.5rem;
  }
  .story-inner{ position:relative; z-index:2; max-width:880px; margin:0 auto; text-align:center; }
  .story h2{ font-size:clamp(1.8rem,4vw,2.6rem); font-weight:500; margin-bottom:.6rem;}
  .story p.lede{ opacity:.85; max-width:520px; margin:0 auto 3.2rem; font-size:1rem; line-height:1.6; }

  .timeline{
    display:flex; justify-content:center; gap:clamp(1.5rem,5vw,4rem);
    max-width:640px; margin:0 auto;
  }
  .tl-col{ display:flex; flex-direction:column; }
  .tl-left{ align-items:flex-end; }
  .tl-right{ align-items:flex-start; }
  .tl-heading{ font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; opacity:.7; margin-bottom:1.2rem; }
  .tl-item{ position:relative; display:flex; align-items:center; gap:.55rem; padding-bottom:1.5rem; }
  .tl-left .tl-item{ flex-direction:row-reverse; }
  .tl-item:last-child{ padding-bottom:0; }
  .tl-item:not(:last-child)::after{
    content:''; position:absolute; bottom:0; width:0; height:1.5rem;
    border-left:2px dashed rgba(255,253,247,.5);
  }
  .tl-left .tl-item:not(:last-child)::after{ right:16px; }
  .tl-right .tl-item:not(:last-child)::after{ left:16px; }
  .tl-photo{
    width:34px; height:34px; flex:0 0 auto; border-radius:50%;
    border:2px solid var(--gold);
    background:repeating-linear-gradient(135deg, rgba(255,253,247,.28), rgba(255,253,247,.28) 5px, rgba(255,253,247,.12) 5px, rgba(255,253,247,.12) 10px);
    display:flex; align-items:center; justify-content:center;
  }
  .tl-photo svg{ width:15px; height:15px; opacity:.75; }
  .tl-city{ font-family:'Space Grotesk', sans-serif; font-size:1.02rem; white-space:nowrap; }

  .tl-converge{ display:flex; justify-content:center; align-items:flex-end; height:34px; margin-top:.2rem; }
  .tl-converge span{
    width:2px; height:32px;
    background-image:linear-gradient(rgba(255,253,247,.55) 50%, transparent 0);
    background-size:2px 8px;
  }
  .tl-converge .l{ transform:rotate(24deg); transform-origin:bottom; }
  .tl-converge .r{ transform:rotate(-24deg); transform-origin:bottom; }

  .tl-node{ display:flex; flex-direction:column; align-items:center; gap:.3rem; }
  .tl-dot{ width:14px; height:14px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 5px rgba(255,200,87,.22); }
  .tl-node .tl-place{ font-family:'Space Grotesk', sans-serif; font-size:1.35rem; }
  .tl-node .tl-tag{ font-size:.63rem; opacity:.7; text-transform:uppercase; letter-spacing:.1em; }

  .tl-line{ width:0; height:2.4rem; margin:.4rem auto; border-left:2px dashed rgba(255,253,247,.5); }

  .tl-node.final .tl-dot{ width:18px; height:18px; background:var(--clay); box-shadow:0 0 0 6px rgba(23,147,166,.25); }
  .tl-node.final .orba{ font-family:'Space Grotesk', sans-serif; font-style:italic; font-size:1.7rem; color:var(--gold); }
  @media (max-width:600px){
    .timeline{ flex-direction:column; align-items:center; gap:2.2rem; }
    .tl-left, .tl-right{ align-items:flex-start; }
    .tl-left .tl-item{ flex-direction:row; }
    .tl-left .tl-item:not(:last-child)::after{ right:auto; left:16px; }
    .tl-converge{ display:none; }
  }

  /* ---------- GALLERY ---------- */
  .gallery{ position:relative; overflow:hidden; background:var(--paper); padding:5.5rem 1.5rem 6rem; }
  .gallery-inner{ position:relative; z-index:2; max-width:1040px; margin:0 auto; text-align:center; }
  .gallery h2{ font-size:clamp(1.8rem,4vw,2.6rem); font-weight:500; }
  .gallery p.lede{ max-width:480px; margin:.8rem auto 3.2rem; opacity:.7; line-height:1.6; }

  .grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:1.6rem 1.2rem;
  }
  @media (max-width:820px){ .grid{ grid-template-columns:repeat(2,1fr); } }

  .polaroid{
    background:#fff;
    padding:.7rem .7rem 2.2rem;
    box-shadow:0 8px 20px rgba(43,38,32,.14), 0 2px 4px rgba(43,38,32,.08);
    position:relative;
    transition:transform .25s ease;
  }
  .polaroid:nth-child(odd){ transform:rotate(-2.2deg); }
  .polaroid:nth-child(even){ transform:rotate(2.4deg); }
  .polaroid:hover{ transform:rotate(0deg) scale(1.03); z-index:3; }
  .polaroid .tape{
    position:absolute; top:-10px; left:50%;
    transform:translateX(-50%) rotate(-3deg);
    width:56px; height:20px;
    background:rgba(231,181,74,.55);
    border:1px solid rgba(231,181,74,.7);
  }
  .placeholder-photo{
    width:100%; aspect-ratio:1/1;
    background:
      repeating-linear-gradient(135deg, #f1ead8, #f1ead8 10px, #ece3cd 10px, #ece3cd 20px);
    display:flex; align-items:center; justify-content:center;
    color:var(--ink); opacity:.55;
  }
  .placeholder-photo svg{ width:34px; height:34px; opacity:.6; }
  .photo-img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
  .polaroid .cap{
    position:absolute; bottom:.6rem; left:0; right:0;
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size:.65rem;
    letter-spacing:.06em;
    opacity:.55;
  }

  /* ---------- GALLERY MASONRY ---------- */
  .masonry{ column-count:4; column-gap:14px; }
  @media (max-width:1040px){ .masonry{ column-count:3; } }
  @media (max-width:720px){ .masonry{ column-count:2; } }
  @media (max-width:440px){ .masonry{ column-count:1; } }
  .masonry .cell{ break-inside:avoid; margin:0 0 14px; }
  .masonry img{
    width:100%; height:auto; display:block;
    background:#fff; padding:6px; border-radius:3px;
    box-shadow:0 6px 16px rgba(43,38,32,.14), 0 2px 4px rgba(43,38,32,.08);
    transition:transform .25s ease;
  }
  .masonry img:hover{ transform:scale(1.02); }
  .ph-circle.has-photo{ background:none; }

  /* ---------- FOOTER ---------- */
  footer{
    background:var(--sea-deeper);
    color:var(--paper);
    text-align:center;
    padding:3.4rem 1.5rem;
  }
  footer .names{ font-family:'Space Grotesk', sans-serif; font-style:italic; font-size:1.4rem; margin-bottom:.5rem; }
  footer .sub{ font-size:.75rem; opacity:.6; letter-spacing:.05em; }
  footer .flags-mini{ margin-top:1rem; display:flex; justify-content:center; }

  @media (prefers-reduced-motion: reduce){
    .front-panel{ transition:none !important; }
    .flying-page{ animation:none !important; display:none; }
    html{ scroll-behavior:auto; }
  }

  a:focus-visible, button:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }
</style>
</head>
<body>

<section class="hero">
  <div class="stars"></div>
  <div class="flying-page p1"><img data-hero-floater alt=""></div>
  <div class="flying-page p2"><img data-hero-floater alt=""></div>
  <div class="flying-page p3"><img data-hero-floater alt=""></div>
  <div class="flying-page p4"><img data-hero-floater alt=""></div>
  <div class="flying-page p5"><img data-hero-floater alt=""></div>
  <div class="flying-page p6"><img data-hero-floater alt=""></div>
  <div class="flying-page s1"><img data-hero-floater alt=""></div>
  <div class="flying-page s2"><img data-hero-floater alt=""></div>
  <div class="flying-page s3"><img data-hero-floater alt=""></div>
  <div class="flying-page s4"><img data-hero-floater alt=""></div>

  <div class="crossed-flags">
    <svg viewBox="0 0 100 80" overflow="visible">
      <defs>
        <linearGradient id="plFlag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="50%" stop-color="#ffffff"/>
          <stop offset="50%" stop-color="#DC143C"/>
          <stop offset="100%" stop-color="#DC143C"/>
        </linearGradient>
        <linearGradient id="esFlag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#AA151B"/>
          <stop offset="25%" stop-color="#AA151B"/>
          <stop offset="25%" stop-color="#F1BF00"/>
          <stop offset="75%" stop-color="#F1BF00"/>
          <stop offset="75%" stop-color="#AA151B"/>
          <stop offset="100%" stop-color="#AA151B"/>
        </linearGradient>
      </defs>
      <g transform="rotate(-24 50 74)">
        <line x1="50" y1="74" x2="50" y2="8" stroke="#8a5a34" stroke-width="3" stroke-linecap="round"/>
        <path d="M50,8 h32 l-7,9 l7,9 h-32 Z" fill="url(#plFlag)" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>
      </g>
      <g transform="rotate(24 50 74)">
        <line x1="50" y1="74" x2="50" y2="8" stroke="#8a5a34" stroke-width="3" stroke-linecap="round"/>
        <path d="M50,8 h32 l-7,9 l7,9 h-32 Z" fill="url(#esFlag)" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>
      </g>
    </svg>
  </div>
  <p class="flag-caption mono">Polska ⨯ España, final union</p>

  <h1>Adam <span class="amp">&amp;</span> Reme</h1>

  <div class="kid-photos">
    <div class="kid-photo">
      <div class="ph-circle" data-kid="adam"><img alt="Adam as a child"></div>
      <span class="kid-cap mono">Adam</span>
    </div>
    <span class="kid-plus">+</span>
    <div class="kid-photo">
      <div class="ph-circle" data-kid="reme"><img alt="Reme as a child"></div>
      <span class="kid-cap mono">Reme</span>
    </div>
  </div>

  <p class="subline">Road to Orba 2027</p>

  <div class="calendar-row" id="calendar-row">
    <div class="flip-unit">
      <div class="flip-card" data-unit="days">
        <div class="ring-pair"><span></span><span></span></div>
        <div class="panel back-panel"><span class="num">000</span></div>
        <div class="panel front-panel"><span class="num">000</span></div>
      </div>
      <div class="unit-label mono">Days</div>
    </div>
    <div class="flip-unit">
      <div class="flip-card" data-unit="hours">
        <div class="ring-pair"><span></span><span></span></div>
        <div class="panel back-panel"><span class="num">00</span></div>
        <div class="panel front-panel"><span class="num">00</span></div>
      </div>
      <div class="unit-label mono">Hours</div>
    </div>
    <div class="flip-unit">
      <div class="flip-card" data-unit="minutes">
        <div class="ring-pair"><span></span><span></span></div>
        <div class="panel back-panel"><span class="num">00</span></div>
        <div class="panel front-panel"><span class="num">00</span></div>
      </div>
      <div class="unit-label mono">Min</div>
    </div>
    <div class="flip-unit">
      <div class="flip-card" data-unit="seconds">
        <div class="ring-pair"><span></span><span></span></div>
        <div class="panel back-panel"><span class="num">00</span></div>
        <div class="panel front-panel"><span class="num">00</span></div>
      </div>
      <div class="unit-label mono">Sec</div>
    </div>
  </div>

  <p class="date-line mono">24 <span class="dot">·</span> 07 <span class="dot">·</span> 2027 <span class="dot">—</span> ORBA, ALICANTE</p>

  <div class="ridge">
    <svg viewBox="0 0 1200 260" preserveAspectRatio="none">
      <path d="M0,260 L0,160 L60,150 L120,170 L180,110 L230,140 L280,90 L330,130 L390,60 L440,100 L500,70 L560,120 L620,80 L690,150 L740,100 L800,140 L860,95 L920,130 L980,75 L1040,120 L1100,90 L1160,140 L1200,110 L1200,260 Z"
        fill="#a5673f" opacity="0.45"/>
      <path d="M0,260 L0,200 L80,190 L150,210 L210,170 L270,195 L340,150 L400,185 L470,140 L540,175 L610,150 L680,190 L750,160 L820,195 L890,155 L960,185 L1030,150 L1100,180 L1160,160 L1200,190 L1200,260 Z"
        fill="#b87b52" opacity="0.5"/>
    </svg>
  </div>

  <p class="scroll-cue mono">Tenía que suceder. ↓</p>
</section>


<section class="gallery">
  <div class="gallery-inner">
    <h2>Our momentitos</h2>
    <p class="lede">Tu y yo, yo y tu ...</p>
    <div class="masonry" id="galleryGrid"></div>
  </div>
</section>

<footer>
  <div class="names">Adam &amp; Reme</div>
  <div class="sub mono">ORBA · ALICANTE · 24.07.2027</div>
  <div class="flags-mini">
    <svg width="44" height="36" viewBox="0 0 100 80" overflow="visible">
      <g transform="rotate(-24 50 74)">
        <line x1="50" y1="74" x2="50" y2="18" stroke="#8a5a34" stroke-width="3" stroke-linecap="round"/>
        <path d="M50,18 h28 l-6,8 l6,8 h-28 Z" fill="url(#plFlag)"/>

<script>
(function(){
  var P = window.__PHOTOS__ || { hero:[], kids:{}, gallery:[] };
  // Floater pool = the whole library (gallery + childhood), shuffled.
  var pool = (P.gallery || []).map(function(p){ return p.src; }).concat(P.hero || []);
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  var floaters = document.querySelectorAll('.hero .flying-page img[data-hero-floater]');
  if (pool.length) {
    var next = 0;
    floaters.forEach(function(img){
      img.src = pool[next++ % pool.length];
      // each time this photo finishes a drift cycle, swap in the next one,
      // so the whole library floats by over time
      var host = img.closest('.flying-page');
      if (host) host.addEventListener('animationiteration', function(){ img.src = pool[next++ % pool.length]; });
    });
  } else {
    document.querySelectorAll('.hero .flying-page').forEach(function(el){ el.style.display = 'none'; });
  }
  Object.keys(P.kids || {}).forEach(function(who){
    var wrap = document.querySelector('.ph-circle[data-kid="' + who + '"]');
    if (wrap && P.kids[who]) { wrap.querySelector('img').src = P.kids[who]; wrap.classList.add('has-photo'); }
  });
  var grid = document.getElementById('galleryGrid');
  if (grid && P.gallery) {
    var frag = document.createDocumentFragment();
    P.gallery.forEach(function(p){
      var cell = document.createElement('div'); cell.className = 'cell';
      var img = document.createElement('img');
      img.src = p.src; img.loading = 'lazy'; img.decoding = 'async'; img.alt = 'Adam & Reme';
      if (p.w && p.h) { img.width = p.w; img.height = p.h; }
      cell.appendChild(img); frag.appendChild(cell);
    });
    grid.appendChild(frag);
  }
})();
</script>

<script>
  // Wedding target: 24 July 2027, noon Orba time (CEST, UTC+2). Adjust the hour here if your ceremony time differs.
  const TARGET = new Date('2027-07-24T12:00:00+02:00').getTime();

  const prev = { days:null, hours:null, minutes:null, seconds:null };

  function pad(n){ return String(n).padStart(2,'0'); }

  function setUnit(key, value){
    value = String(value);
    if(prev[key] === value) return;
    const isFirstPaint = prev[key] === null;
    prev[key] = value;

    const card = document.querySelector(`.flip-card[data-unit="${key}"]`);
    if(!card) return;
    const back = card.querySelector('.back-panel .num');
    const front = card.querySelector('.front-panel');
    const frontNum = front.querySelector('.num');

    if(isFirstPaint){
      back.textContent = value;
      frontNum.textContent = value;
      return;
    }

    back.textContent = value;
    front.classList.add('flipping');

    const onEnd = () => {
      front.classList.remove('flipping');
      front.classList.add('no-transition');
      frontNum.textContent = value;
      void front.offsetWidth; // force reflow
      front.classList.remove('no-transition');
      front.removeEventListener('transitionend', onEnd);
    };
    front.addEventListener('transitionend', onEnd);
  }

  function tick(){
    const now = Date.now();
    const diff = Math.max(0, TARGET - now);

    const DAY = 86400000, HOUR = 3600000, MIN = 60000;
    const days = Math.floor(diff / DAY);
    const hours = Math.floor((diff % DAY) / HOUR);
    const minutes = Math.floor((diff % HOUR) / MIN);
    const seconds = Math.floor((diff % MIN) / 1000);

    setUnit('days', days);
    setUnit('hours', pad(hours));
    setUnit('minutes', pad(minutes));
    setUnit('seconds', pad(seconds));
  }

  tick();
  setInterval(tick, 1000);
</script>
